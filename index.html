<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#161021">
  


<meta name="description" content="Turn images into Brawl Stars maps in seconds!">

<meta name="keywords" content="brawl stars, map maker, mappybs, mappy, bs, haru, haruyt600">

<meta name="author" content="HaruYT600">
  <meta property="og:title" content="MappyBS - Images to Brawl Maps">

<meta property="og:description" content="Turn images into Brawl Stars maps in seconds!">

<meta property="og:type" content="website">

<meta property="og:url" content="https://mappybs.github.io">

<meta property="og:image" content="https://i.ibb.co/p6LK1L1g/Untitled862-20260421235849.png">

<meta property="og:site_name" content="MappyBS">

<!-- Favicon -->

<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
    <title>MappyBS - Brawl Stars Map Maker</title>

    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal-js@1.4.5/dist/background-removal.umd.min.js"></script>
</head>

<body>
<div class="app">

    <header class="app-header">
        <h1>
            <img class="title-logo" src="https://i.ibb.co/p6LK1L1g/Untitled862-20260421235849.png" alt="MappyBS logo">
            MappyBS
            <span class="title-badge">Brawl Stars Map Maker from Image</span>
        </h1>
        <div class="header-underline"></div>
    </header>

    <div class="main-panel">

        <!-- LEFT -->
      <!-- why are u looking at ts -->
        <div class="left-col">
            <div class="preview-card">

                <div class="canvas-wrapper">
                    <canvas id="previewCanvas" width="400" height="400"></canvas>
                </div>

                <!-- BUTTON BAR -->
                <div class="action-bar">

                    <label for="fileInput" class="btn btn-upload">
                        <span class="btnn-text">UPLOAD</span>
                    </label>

                    <input type="file" id="fileInput" accept="image/png, image/jpeg, image/webp, image/bmp" hidden>

                    <div class="btn-group">

                        <!-- hidden buttons (still exist for JS compatibility) -->
                        <button class="btn btn-secondary" id="resetImageBtn" style="display:none;">
                            <span class="btn-icon">⟲</span> Reset
                        </button>

                        <button class="btn btn-accent" id="removeBgBtn" style="display:none;">
                            <span class="btn-icon">✂️</span> Remove BG
                        </button>

                        <button class="btn btn-secondary" id="undoBtn" style="display:none;">
                            <span class="btn-icon">↩️</span> Undo
                        </button>

                        <button class="btn btn-primary" id="generateMapBtn">
                            <span class="btn-icon"></span> GENERATE MAP
                        </button>

                        <button class="btn btn-success" id="downloadMapBtn" disabled>
                            <span class="btn-icon"></span> DOWNLOAD
                        </button>

                        

                        <button class="btn btn-success" id="downloadAnimBtn" disabled>
                            <span class="btn-icon"></span> Download Animation
                        </button>

                    </div>
                </div>

                <!-- image info -->
                <div id="imageInfo" class="image-stats">
                    <span class="stat-badge">📌 No image loaded — upload or use default stickman</span>
                </div>

            </div>
        </div>

        <!-- RIGHT (hidden but kept for JS sliders) -->
        <div class="right-col" style="display:none;">

            <div class="tuning-panel">
                <h3 class="panel-title">
                    <span>🎚️ adjust & refine</span>
                    <span class="panel-arrow">▼</span>
                </h3>

                <div class="slider-card">
                    <div class="slider-header">
                        <label for="brightness">🔆 Brightness</label>
                        <span id="brightVal">0%</span>
                        <button class="slider-reset" data-slider="brightness" data-default="0">↺</button>
                    </div>
                    <input type="range" id="brightness" min="-100" max="100" value="0">
                </div>

                <div class="slider-card">
                    <div class="slider-header">
                        <label for="contrast">◑ Contrast</label>
                        <span id="contrastVal">0%</span>
                        <button class="slider-reset" data-slider="contrast" data-default="0">↺</button>
                    </div>
                    <input type="range" id="contrast" min="-100" max="100" value="0">
                </div>

                <div class="slider-card">
                    <div class="slider-header">
                        <label for="pixelate">🔲 Pixelate</label>
                        <span id="pixelateVal">1x</span>
                        <button class="slider-reset" data-slider="pixelate" data-default="1">↺</button>
                    </div>
                    <input type="range" id="pixelate" min="1" max="20" value="1">
                </div>

                <div class="slider-card">
                    <div class="slider-header">
                        <label for="stretchX">↔️ Stretch X</label>
                        <span id="stretchXVal">1.0</span>
                        <button class="slider-reset" data-slider="stretchX" data-default="1.0">↺</button>
                    </div>
                    <input type="range" id="stretchX" min="0.5" max="2.0" value="1.0" step="0.05">
                </div>

                <div class="slider-card">
                    <div class="slider-header">
                        <label for="stretchY">↕️ Stretch Y</label>
                        <span id="stretchYVal">1.0</span>
                        <button class="slider-reset" data-slider="stretchY" data-default="1.0">↺</button>
                    </div>
                    <input type="range" id="stretchY" min="0.5" max="2.0" value="1.0" step="0.05">
                </div>

            </div>

        </div>

    </div>

    <footer class="app-footer">
        <div class="footer-inner">
            <div class="footer-left" aria-hidden="false">
                © <span id="year"></span> HaruYT600. All rights reserved.
            </div>

            <div class="footer-center">
                <nav class="footer-nav" aria-label="Social links">
                    <a href="https://youtube.com/@HaruYT600" target="_blank" rel="noopener" title="YouTube" class="social-link">
                        <img class="social-icon" src="https://i.ibb.co/pC3wXcL/Untitled864-20260422204814.png" alt="YouTube">
                    </a>
                    <a href="https://tiktok.com/@haruyt600" target="_blank" rel="noopener" title="TikTok" class="social-link">
                        <img class="social-icon" src="https://i.ibb.co/xnmRZ1z/Untitled864-20260422204803.png" alt="TikTok">
                    </a>
                    <a href="https://discord.gg/SSFu8DqvkY" target="_blank" rel="noopener" title="Discord" class="social-link">
                        <img class="social-icon" src="https://i.ibb.co/GQF87T4b/Untitled864-20260422204749.png" alt="Discord">
                    </a>
                </nav>
            </div>

            <div class="footer-right" aria-hidden="true">
                <!-- reserved for future small meta / social -->
            </div>
        </div>
    </footer>
    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>

</div>

<script src="mapmaker.js"></script>
</body>
</html>
